body:
  text: 孔子編年巻四宋胡仔撰丁已魯哀公十一年年六十八在衛已五年齊師伐魯及清季康子使冉求率左師逆之獲甲首八十齊人宵遁冉求用矛於齊師故能入其軍孔子曰義也是役也公為與其嬖僮汪錡乘皆死皆殯孔子曰能執干戈以衛社稷可無殤也又曰孟之反不伐奔而殿將入門策其馬曰非敢後也馬不進也冉求既有功於魯季康子曰子之於軍旅學之乎性之乎冉求曰學之於孔子季康子曰孔子何如人哉對曰用之有名播之百姓質之鬼神而無憾然求之不以道雖累千社夫子不利也康子曰我欲召之可乎對曰無以小人間之則可矣衛孔文子將攻大叔訪於仲尼仲尼曰簠簋之事則嘗學之矣甲兵之事未之聞也退命駕而行曰鳥則擇木木豈能擇鳥文子遽止之曰圉豈敢度其私訪衛國之難也將止㑹季康子逐公革公賓公林以幣迎孔子孔子於是自衛反魯息駕於河梁而觀焉有懸水三十仞圜流九十里魚鼈不為𨗳黿鼉不能居有一丈夫方將厲之孔子使人並涯止之曰此懸水三十仞圜流九十里魚鼈黿鼉不能居也意者難可濟也丈夫不以措意遂度而出孔子問之曰巧乎有道術乎所以能入而出者何也丈夫對曰始吾之入也先以忠信及吾之出也又從以忠信忠信措吾軀於波流而吾不敢以用私所以能入而復出也孔子謂弟子曰二三子識之水且猶可以忠信之身親之而况於人乎孔子將行雨而無蓋門人曰商也有之孔子曰商之為人也甚恡於財吾聞與人交推其長者違其短者故能久也乃止過㤗山側有婦哭於墓者而哀夫子式而聽之使子貢問之曰子之哭也壹似重有憂者而曰然昔者吾舅死於虎吾夫又死焉今吾子又死焉夫子曰何為不去也曰無苛政夫子曰小子識之苛政猛於虎也子游為武城宰孔子過之聞絃歌之聲莞爾而笑曰割雞焉用牛刀子游曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使也子曰二三子偃之言是也前言戲之耳因問曰女得人焉爾乎子游對曰有澹臺滅明者行不由徑非公事未嘗至於偃之室也由此澹臺滅明見於孔子然狀貌甚惡孔子以為材薄既受業南遊至江從弟子三百人設取予去就名施乎諸侯孔子聞之曰吾以言取人失之宰予以貌取人失之子羽至魯魯哀公問於孔子曰夫子之服其儒服與孔子對曰丘少居魯衣逢掖之衣長居宋冠章甫之冠丘聞之也君子之學也博其服也鄉丘不知儒服哀公曰敢問儒行孔子對曰遽數之不能終其物悉數之乃留更僕未可終也哀公命席孔子侍曰儒有席上之珍以待聘夙夜强學以待問懐忠信以待舉力行以待取其自立有如此者儒有衣冠中動作慎大譲如慢小譲如偽大則如威小則如愧其難進而易退也粥粥若無能也其容貌有如此者儒有居處齊難其坐起恭敬言必先信行必中正道塗不爭險易之利冬夏不爭隂陽之和愛其死以有待也養其身以有為也其備豫有如此者儒有不寳金玉而忠信以為寳不祈土地立義以為土地不祈多積多文以為富難得而易禄也易禄而難畜也非時不見不亦難得乎非義不合不亦難畜乎先勞而後禄不亦易禄乎其近人有如此者儒有委之以貨財淹之以樂好見利不虧其義劫之以衆沮之以兵見死不更其守鷙蟲攫搏不程勇者引重鼎不程其力往者不悔來者不豫過言不再流言不極不斷其威不習其謀其特立有如此者儒有可親而不可劫也可近而不可迫也可殺而不可辱也其居處不淫其飲食不溽其過失可微辨而不可面數也其剛毅有如此者儒有忠信以為甲胄禮義以為干櫓戴仁而行抱義而處雖有暴政不更其所其自立有如此者儒有一畝之宫環堵之室蓽門圭窬蓬戸甕牖易衣而出幷日而食上答之不敢以疑上不答不敢以諂其仕有如此者儒有今人與居古人與稽今世行之後世以為楷適弗逢世上弗援下弗推讒諂之民有比黨而危之者身可危也而志不可奪也雖危起居竟信其志猶將不忘百姓之病也其憂思有如此者儒有博學而不窮篤行而不倦幽居而不淫上通而不困禮之以和為貴忠信之美優游之法慕賢而容衆毁方而瓦合其寛裕有如此者儒有内稱不辟親外舉不辟怨程功積事推賢而進達之不望其報君得其志茍利國家不求富貴其舉賢援能有如此者儒有聞善以相告也見善以相示也爵位相先也患難相死也久相待也逺相致也其任舉有如此者儒有澡身而浴德陳言而伏静而正之上弗知也麤而翹之又不急為也不臨深而為高不加少而為多世治不輕世亂不沮同弗與異弗非也其特立獨行有如此者儒有上不臣天子下不事諸侯慎靜而尚寛强毅以與人博學以知服近文章砥厲亷隅雖分國如錙銖不臣不仕其規為有如此者儒有合志同方營道同術並立則樂相下不厭久不相見聞流言不信其行本方立義同而進不同而退其交友有如此者温良者仁之本也敬慎者仁之地也寛裕者仁之作也孫接者仁之能也禮節者仁之貌也言談者仁之文也歌樂者仁之和也分散者仁之施也儒皆兼此而有之猶且不敢言仁也其尊讓有如此者儒有不隕穫於貧賤不充詘於富貴不慁君王不累長上不閔有司故曰儒今衆人之命儒也妄常以儒相詬病孔子至舍哀公館之聞此言也言加信行加義終没吾世不敢以儒為戲子華使於齊冉子為其母請粟子曰與之釡請益曰與之庾冉子與之粟五秉子曰赤之適齊也乘肥馬衣輕裘吾聞之也君子周急不繼富季孫欲以田賦使冉有訪諸孔子孔子曰丘不識也三發卒焉曰子為國老待子而行若之何子之不言也孔子不對而私於冉有曰君子之行也度於禮施取其厚事舉其中斂從其薄如是則以丘亦足矣若不度於禮而貪暴無厭則雖以田將又不足且子季孫若欲行而法則周公之典在若欲茍而行又何訪焉弗聽卒用田賦季孫旅於泰山孔子謂冉有曰女弗能救與對曰不能曰嗚呼曽謂泰山不如林放乎是時季氏富於周公而求也為之聚斂而附益之孔子黜之曰非吾徒也小子鳴鼔而攻之可也冉子退朝子曰何晏也對曰有政子曰其事也如有政雖不吾以吾其與聞之樊遲從遊於舞雩之下曰敢問崇德脩慝辨惑子曰善哉問先事後得非崇德與攻其惡無攻人之惡非脩慝與一朝之忿忘其身以及其親非惑與蘧伯玉使人於孔子孔子與之坐而問焉曰夫子何為對曰夫子欲寡其過而未能也使者出子曰使乎使乎叔仲㑹與孔旋年相比二人迭侍孔子執筆記事孟武伯見孔子而問曰此二孺子之㓜也於學豈識於壯哉孔子曰然少成若天性習慣若自然也伯魚之母死期而猶哭孔子聞之曰誰與哭者門人曰鯉也孔子曰嘻其甚矣伯魚聞之遂除之子夏為莒父宰問政子曰無欲速無見小利欲速則不達見小利則大事不成哀公問政於孔子孔子對曰政之急者莫大乎使民富且夀也公曰為之奈何孔子曰省力役薄賦斂則民富矣敦禮教逺罪疾則民夀矣公曰寡人欲行夫子之言恐吾國貧矣孔子曰詩云愷悌君子民之父母未有子富而父母貧者也哀公問於孔子曰子從父命孝乎臣從君命貞乎三問孔子不對孔子趨出以語子貢曰鄉者君問丘曰子從父命孝乎臣從君命貞乎三問而丘不對賜以為何如子貢曰子從父命孝矣臣從君命貞矣夫子有奚對焉孔子曰小人哉賜不識也昔萬乘之國有爭臣四人則封疆不削千乘之國有爭臣三人則社稷不危百乘之國有爭臣二人則宗廟不輟父有爭子不行無禮士有爭友不為不義故子從父奚子孝臣從君奚臣貞審其所以從之之謂孝之謂貞也戊午魯哀公十二年年六十九夏五月昭夫人孟子卒孔子與弔適季氏季氏不絻放絰而拜哀公問何為則民服孔子對曰舉直錯諸枉則民服舉枉錯諸直則民不服季康子問使民敬忠以勸對曰臨之以莊則敬孝慈則忠舉善而教不能則勸康子問政對曰政者正也子帥以正孰敢不正康子患盜對曰茍子之不欲雖賞之不竊又問如殺無道以就有道何如對曰子為政焉用殺子欲善而民善矣君子之德風小人之德草草上之風必偃孔子因言衛靈公之無道也康子曰夫如是奚而不喪孔子曰仲叔圉治賓客祝鮀治宗廟王孫賈治軍旅夫如是奚其喪季康子問仲由可使從政也與子曰由也果於從政乎何有曰賜也可使從政也與曰賜也達於從政乎何有曰求也可使從政也與曰求也藝於從政乎何有孟武伯問孝子曰父母唯其疾之憂孟武伯問子路仁乎子曰不知也又問子曰由也千乘之國可使治其賦也不知其仁也求也何如子曰求也千室之邑百乘之家可使為之宰也不知其仁也赤也何如子曰赤也束帶立於朝可使與賓客言也不知其仁也季子然問仲由冉求可謂大臣與子曰吾以子為異之問曾由與求之問所謂大臣者以道事君不可則止今由與求也可謂具臣矣曰然則從之者與子曰弑父與君亦不從也呉之伐越也墮㑹稽得骨節專車呉子使使聘魯且問之孔子曰無以吾命也賓既將命發幣於大夫及孔子孔子爵之既徹爼而燕客執骨而問曰骨何者為大孔子曰丘聞之昔禹致羣臣於㑹稽之山防風氏後至禹殺而戮之其骨專車此為大矣客曰誰為神孔子曰山川之神足以紀綱天下其守為神社稷為公侯皆屬於王者客曰防風何守孔子曰汪罔氏之君守封禺之山為漆姓在虞夏商為汪芒氏於周為長狄今謂之大人客曰人長幾何孔子曰焦僥氏三尺短之至也長者不過十數之極也魯之君臣終不能用孔子孔子亦不求仕蓋父母之邦且將老焉自周室衰微而禮樂詩書缺孔子憂後世之無述也於是叙書上紀唐虞下至秦穆為百篇古者詩三千餘篇於是刪詩上採契稷中述商周之盛至幽厲之缺始於袵席故曰關雎之亂以為風始鹿鳴為小雅始文王為大雅始清廟為頌始三百五篇孔子皆絃歌之以求合韶武雅頌之音故曰吾自衛反魯然後樂正雅頌各得其所曰夏禮吾能言之杞不足徴也殷禮吾能言之宋不足徴也文獻不足故也足則吾能徴之矣觀三代所損益曰後雖百世可知也周監乎二代郁郁乎文哉吾從周與魯太師論樂曰樂其可知也始作翕如也從之純如也皦如也繹如也以成若夫禮樂之説遭秦焚書之變其詳細不得而聞矣曾子問曰古者師行必以遷廟主行乎孔子曰天子廵狩以遷廟主行載於齊車言必有尊也今也取七廟之主以行則失之矣當七廟五廟無虚主虚主者唯天子崩諸侯薨與去其國與祫祭於祖為無主耳吾聞諸老耼曰天子崩國君薨則祝取羣廟之主而藏諸祖廟禮也卒哭成事而后主各反其廟君去其國大宰取羣廟之主以從禮也祫祭於祖則祝迎四廟之主主出廟入廟必蹕老耼云曾子又問曰𦵏引於堩日有食之則變乎且不乎孔子曰昔者吾從老耼助𦵏於巷黨及堩日有食之老耼曰丘止柩就道右止哭以聽變既明反而后行曰禮也反𦵏而丘問之曰夫柩不可以反者也日有食之不知其已之遲數則豈如行哉老耼曰諸侯朝天子見日而行逮日而舍奠大夫使見日而行逮日而舍夫柩不蚤出不暮宿見星而行者唯罪人與奔父母之喪者乎日有食之安知其不見星也且君子行禮不以人之親痁患吾聞諸老耼云曾子又問曰下殤土周𦵏於園遂輿機而往塗邇故也今墓逺則其𦵏之也如之何孔子曰吾聞諸老耼曰昔者史佚有子而死下殤也墓逺召公謂之曰何以不棺斂於宫中史佚曰吾敢乎哉召公言於周公周公曰豈不可史佚行之下殤周棺衣棺自史佚始也子貢問曰三年之喪卒哭金革之事無辟也者禮與初有司與孔子曰夏后氏三年之喪既殯而致事殷人既𦵏而致事記曰君子不奪人之親亦不可奪親也此之謂乎子夏曰金革之事無辟也者非與孔子曰吾聞諸老耼曰昔者魯公伯禽有為為之也今以三年之喪從其利者吾弗知也賓牟賈侍坐於孔子孔子與之言及樂曰夫武之備戒之已久何也對曰病不得其衆也咏嘆之滛泆之何也對曰恐不逮事也發揚蹈厲之已蚤何也對曰及時事也武坐致右憲左何也對曰非武坐也聲淫及商何也對曰非武音也子曰若非武音則何音也對曰有司失其傳也若非有司失其傳則武王之志荒矣子曰唯丘之聞諸萇𢎞亦若吾子之言是也賓牟賈起免席而請曰夫武之備戒之已久則既聞命矣敢問遲之遲而又久何也子曰居吾語女夫樂者象成者也總干而山立武王之事也發揚蹈厲太公之志也武亂皆坐周召之治也且夫武始而北出再成而滅商三成而南四成而南國是疆五成而分周公左召公右六成復綴以崇天子夾振之而駟伐盛威於中國也分夾而進事蚤濟也久立於綴以待諸侯之至也且女獨未聞牧野之語乎武王克殷反商未及下車而封黄帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後於杞投殷之後於宋封王子比干之墓釋箕子之囚使之行商容而復其位庶民弛政庶士倍禄濟河而西馬散之華山之陽而弗復乘牛散之桃林之野而弗復服車甲衅而藏之府庫而弗復用倒載干戈包之以虎皮將帥之士使為諸侯名之曰建􅐤然後天下知武王之不復用兵也散軍而郊射左射貍首右射騶虞而貫革之射息也禆冕搢笏而虎賁之士説劒也祀乎明堂而民知孝朝覲然後諸侯知所以臣耕藉然後諸侯知所以敬五者天下之大教也食三老五更於大學天子袒而割牲執醬而饋執爵而酳冕而總干所以教諸侯之弟也若此則周道四達禮樂交通則夫武之遲久不亦宜乎曾子事親孝孔子閒居曾子侍坐因為之作孝經嘗曰吾志在春秋行在孝經師冕見及階子曰階也及席子曰席也皆坐子告之曰某在斯某在斯師冕出子張問曰與師言之道與子曰然固相師之道也冬十二月螽季孫問諸孔子孔子曰丘聞之火伏而後蟄者畢今火猶西流司厯過也魯國之法贖人臣妾於諸侯者皆取金於府子貢贖之辭而不取金孔子聞之曰賜失之矣夫聖人之舉事也可以移風易俗而教導可以施之於百姓非獨適身之行也今魯國富者寡而貧者衆贖人受金則為不亷則何以相贖乎自今以後魯人不復贖人於諸侯矣哀公問曰紳委章甫有益於人乎孔子作色而對曰君胡然焉衰麻苴杖者志不存乎樂非耳弗聞服使然也黼黻衮冕者容不䙝慢非性務莊服使然也介胄執戈者無退懦之氣非體純猛服使然也且臣聞之好肆不守折而長者不為市竊夫其有益與無益君子所以知也哀公問於孔子曰當今之君孰為最賢孔子對曰丘未之見也抑有衛靈公乎公曰吾聞其閨門之内無别而子次之賢何也孔子曰臣語其朝廷行事不論其私家之際也公曰其事何如孔子對曰靈公之弟曰公子渠年其智足以治千乘其守足以守之靈公愛而任之又有士林國者見賢必進之而退與分其禄是以靈公無遊放之士靈公賢而尊之又有士曰慶足者衛國有大事則必起而治之國無事則退而容賢靈公説而敬之又有大夫史鰌以道去衛而靈公郊舍三日琴瑟不御必待史鰌之入然後敢入臣以此取之雖次之賢不亦可乎孔子侍坐於哀公賜之桃與黍焉哀公曰請食孔子先食黍而後食桃左右皆掩口而笑公曰黍者所以雪桃非為食之也孔子對曰丘知之矣然夫黍者五穀之長郊禮宗廟以為上盛菓屬有六而桃為下祭祀不用不登郊廟丘聞之君子以賤雪貴不聞以貴雪賤今以五穀之長雪菓之下者是從上雪下臣以為妨於教害於義故不敢公曰善哉顔淵季路侍子曰盍各言爾志子路曰願車馬衣輕裘與朋友共敝之而無憾顔淵曰願無伐善無施勞子路曰願聞子之志子曰老者安之朋友信之少者懐之子路曾晳冉有公西華侍坐子曰以吾一日長乎爾毋吾以也居則曰不吾知也如或知爾則何以哉子路率爾而對曰千乘之國攝乎大國之間加之以師旅因之以饑饉由也為之比及三年可使有勇且知方也夫子哂之求爾何如對曰方六七十如五六十求也為之比及三年可使足民如其禮樂以俟君子赤爾何如對曰非曰能之願學焉宗廟之事如㑹同端章甫願為小相焉㸃爾何如鼓瑟希鏗爾舍瑟而作對曰異乎三子者之撰子曰何傷乎亦各言其志也曰莫春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸夫子喟然歎曰吾與㸃也三子者出曾晳後曾晳曰夫三子者之言何如子曰亦各言其志也已矣曰夫子何哂由也曰為國以禮其言不讓是故哂之唯求則非邦也與安見方六七十如五六十而非邦也者唯赤則非邦也與宗廟㑹同非諸侯而何赤也為之小孰能為之大公伯寮愬子路於季孫子服景伯以告曰夫子固有惑志於公伯寮吾力猶能肆諸市朝子曰道之將行也與命也道之將廢也與命也公伯寮其如命何大宰問於子貢曰夫子聖者與何其多能也子貢曰固天縱之將聖又多能也子聞之曰大宰知我乎吾少也賤故多能鄙事君子多乎哉不多也伯高死於衛赴於孔子孔子曰吾惡乎哭諸兄弟吾哭諸廟父之友吾哭諸廟門之外師吾哭諸寢朋友吾哭諸寢門之外所知吾哭諸野於野則已疏於寢則已重夫由賜也見我吾哭諸賜氏遂命子貢為之主曰為爾哭也來者拜之知伯高而來者勿拜也伯高之䘮孔氏之使者未至冉子攝束帛乘馬而將之孔子曰異哉徒使我不誠於伯高伯魚卒孔子編年巻四
