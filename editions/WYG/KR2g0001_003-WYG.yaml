body:
  text: 孔子編年巻三宋胡仔撰乙巳魯定公十四年年五十六孔子由大司寇攝行相事有喜色仲由問曰由聞君子禍至不懼福至不喜今夫子得位而喜何也孔子曰然有是言也不曰樂以其貴下人乎於是秉政七日誅魯大夫亂政者少正夘於兩觀之下子貢進曰夫少正夘魯之聞人也今夫子為政而遽誅之或者為失乎孔子曰居吾語女天下有大惡者五而竊盜不與焉一曰心逆而險二曰行僻而堅三曰言偽而辯四曰記醜而博五曰順非而澤此五者有一於人則不免君子之誅而少正夘皆兼有之其居處足以聚徒成黨其談説足以􅎖褒榮衆其強禦足以反是獨立此乃人之奸雄者也不可以不除夫殷湯誅尹諧文王誅潘正周公誅管蔡太公誅華士管仲誅付乙子産誅史何凡此七子皆異世而同誅者以七子異世而同惡故不可赦也與聞國政三月鬻羔豚者弗飾賈男女行者别於塗塗不拾遺四方之客至於邑者不求有司皆予之以歸齊人聞而懼曰孔子為政必霸霸則吾地近焉我為之先并矣盍致地焉犁鉏曰請先嘗沮之沮之而不可則致地庸遲乎於是選齊國中女子好者八十人皆衣文衣而舞康樂文馬三十匹遺魯君陳女樂文馬於魯城南高門外季桓子微服往觀再三將受乃語魯君為周道遊往觀終日怠於政事子路曰夫子可以行矣孔子曰魯今且郊如致膰乎大夫則吾猶可以止桓子卒受齊女樂三日不聽政郊又不致膰於大夫孔子遂行宿乎屯而師巳送曰夫子則非罪孔子曰吾歌可夫歌曰彼婦之口可以出走彼婦之謁可以死敗蓋優哉游哉聊以卒嵗師巳反桓子曰師巳亦何言師巳以實告桓子喟然嘆曰夫子罪我以羣婢故也夫子適衞冉有僕子曰庶矣哉冉有曰旣庶矣又何加焉曰富之曰旣富矣又何加焉曰教之至衛主於子路妻兄顔讎由衛之執政有欲孔子昵已者於是大夫王孫賈問曰與其媚於奥寧媚於竈何謂也對曰不然獲罪於天無所禱也儀封人請見曰君子之至於斯也吾未嘗不得見也從者見之出曰二三子何患於喪乎天下之無道也乆矣天將以夫子為木鐸衛公孫朝問於子貢曰仲尼焉學子貢曰文武之道未墜於地在人賢者識其大者不賢者識其小者莫不有文武之道焉夫子焉不學而亦何常師之有衛靈公問孔子居魯得禄幾何對曰奉粟六萬衛人亦致粟六萬居頃之或譖孔子於衛靈公靈公使公孫余一出一入孔子恐獲罪焉居十月去衛將適陳過匡顔刻為僕以其策指之曰昔吾入此由彼缺也匡人聞之以為魯之陽虎陽虎嘗暴匡人匡人於是遂止孔子孔子狀類陽虎拘焉五日顔淵後子曰吾以女為死矣顔淵曰子在囘何敢死匡人拘孔子益急弟子懼孔子曰文王既没文不在兹乎天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如予何孔子使從者為甯武子臣於衛然後得去過蒲子路時為蒲大夫孔子入其境曰善哉由也恭敬以信矣入其邑曰善哉由也忠信而寛矣至庭曰善哉由也明察以㫁矣子貢執轡而問曰夫子未見由之政而三稱其善其善可得聞乎孔子曰吾見其政矣入其境田疇盡易草萊甚辟溝洫深治此其恭敬以信故其民盡力也入其邑墻屋完固樹木甚茂此其忠信以寛故其民不偷也至其庭庭甚清閒諸下用命此其明察以㫁故其民不擾也以此觀之雖三稱其善庸盡其善者乎在蒲時子路為水備與其民修溝瀆以民之勞煩苦也人與之簞食壺漿孔子聞之使子貢止之子貢忿然不説往見孔子曰由也以暴雨將至恐有水災故與民修溝洫以備之而民多匱乏者是以簞食壺漿而與之夫子使賜止之是夫子止由之行仁也夫子以仁教而禁其行由不受也孔子曰女以民為餓也何不白於君發倉廩以賑之而私以爾食饋之是女明君之無惠而見已之德美矣女速已則可否則女之見罪必矣居月餘復反於衛主蘧伯玉孔子嘗稱蘧伯玉曰君子哉邦有道則仕邦無道則可巻而懐之衛靈公夫人南子使人謂孔子曰四方之君子不辱寡君為兄弟者必見寡小君寡小君願見孔子辭謝不得巳而見之夫人在絺帷中孔子入門北面稽首夫人自帷中再拜環珮玉聲璆然孔子曰吾鄉為弗見見之禮答焉子路不説孔子矢之曰吾所否者天厭之天厭之在衛月餘靈公與夫人同車宦者雍渠参乘使孔子為次乘招搖過市孔子曰吾未見好德如好色者也於是醜之而去去衛過曹適宋見宋君宋君問孔子曰吾欲使長有國而列都得之吾欲使民無惑吾欲使士竭力吾欲使日月當時吾欲使聖人自來吾欲使官府治理為之奈何孔子對曰千乘之君問丘者多矣而未有若主君之問之悉也然主君所欲者盡可得也丘聞之鄰國相親則長有國君惠臣忠則列都得之不殺無辜無釋罪人則民不惑士益之禄則皆竭力尊天敬神則日月當時崇道貴德則聖人自來任能黜否則官府治理宋君曰善哉豈不然乎寡人不佞不足以致之也孔子曰此事非難唯欲行之云耳在宋與弟子習禮大樹下宋司馬桓魋欲害孔子拔去其樹孔子曰天生德於予桓魋其如予何自宋適鄭與弟子相失獨立鄭東門人或謂子貢曰東門有人其顙似堯其項類臯陶其肩類子産然自腰以下不及禹三寸纍纍若喪家之狗子貢以告孔子欣然笑曰形狀未也而似喪家之狗然哉然哉丙午魯定公十五年年五十七自鄭適陳主於司城貞子有隼集於陳廷而死楛矢貫之石砮矢長尺有咫陳恵公使使問仲尼仲尼曰隼來逺矣此肅慎氏之矢也昔武王克商通道九夷百蠻使各以其方賄來貢以無忘職業於是肅慎貢楛矢石砮長尺有咫先王欲昭其令德以肅慎矢分大姬配虞胡公而封諸陳分同姓以珍玉展親也分異姓以逺方職貢使無忘服也故分陳以肅慎矢試求之故府果得之邾隱公朝於魯子貢觀焉邾子執玉高其容仰公受玉卑其容俯子貢曰以禮觀之二君者皆有死亡焉夫禮死生存亡之體也將左右周旋進退俯仰於是乎取之朝祀喪戎於是乎觀之今正月相朝而皆不度心巳亡矣嘉事不體何以能久髙仰驕也卑俯替也驕近亂替近疾君為主其先亡乎夏五月定公薨孔子曰賜不幸言而中是使賜多言者也丁未魯哀公元年年五十八在陳陳司敗問昭公知禮乎孔子曰知禮孔子退揖巫馬期而進之曰吾聞君子不黨君子亦黨乎君取於呉為同姓謂之呉孟子君而知禮孰不知禮巫馬期以告孔子曰丘也幸茍有過人必知之戊申魯哀公二年年五十九居陳已三嵗㑹晉楚爭彊更伐陳及呉侵陳陳常被寇孔子於是去陳將復適衛過蒲㑹公叔氏以蒲畔蒲人止孔子弟子有公良孺者以私車五乘從孔子其為人長賢有勇力謂曰吾昔從夫子遇難於匡今又遇難於此命也夫吾與夫子再罹難寧鬭而死挺劒合衆將與之戰蒲人懼謂孔子曰茍毋適衛吾出子與之盟出孔子東門孔子遂適衛子貢曰盟可負耶孔子曰要盟也神不聽衛靈公聞孔子來喜郊迎問曰蒲可伐乎對曰可靈公曰吾大夫以為不可今蒲衛之所以待晉楚也以衛伐之無乃不可乎孔子曰其男子有死之志婦人有保西河之志吾所伐者不過四五人靈公曰善哉不伐蒲是時靈公老怠於政不用孔子孔子嘆曰茍有用我者朞月而已可也三年有成擊磬於衛有荷簣而過門者曰有心哉擊磬乎既而曰鄙哉硜硜乎莫已知也斯已而已矣深則厲淺則掲孔子聞之曰果哉末之難矣自衛將適晉趙簡子攻范中行伐中牟佛肸以中牟叛召孔子孔子欲往子路曰由聞諸夫子親於其身為不善者君子不入也佛肸以中牟叛子之往也如之何孔子曰有是言也不曰堅乎磨而不磷不曰白乎湼而不淄吾豈匏瓜也哉焉能繫而不食學鼔琴於師㐮十日不進師襄曰可以益矣曰丘習其曲矣未得其數也有間曰已習其數可以益矣曰丘未得其志也有間曰已習其志可以益矣曰丘未得其為人也有間曰有所穆然而深思焉有所怡然高望而逺志焉曰丘得其為人矣黯然而黑頎然而長眼如望羊如王四國非文王其孰能為此也師襄辟席再拜曰師蓋云文王操也適晉至河間趙簡子殺竇鳴犢舜華臨河而嘆曰美哉水洋洋乎丘之不濟此命也夫子貢趨而進曰敢問何謂也孔子曰竇鳴犢舜華晉之賢大夫也趙氏未得志之時須此兩人而後從政及其得志殺之乃從政丘聞之也刳胎殺夭則麒麟不至其郊竭澤而漁則蛟龍不處其淵覆巢毁卵則鳯凰不翔其邑何則諱傷其類也夫鳥獸之於不義也尚知辟之而况丘哉乃還息於陬鄉作陬操以哀之反於衛復主蘧伯玉靈公問陳於孔子孔子對曰爼豆之事則嘗聞之矣軍旅之事未之學也明日與孔子語見蜚雁仰視之色不在孔子孔子遂行復如陳已酉魯哀公三年年六十在陳魯桓宫僖宫災孔子聞之曰其桓僖乎陳侯曰何以知之孔子曰禮祖有功而宗有德故不毁其廟焉今桓僖之親盡矣又功德不足以存其廟而魯不毁是以天災加之三日魯使至問焉則桓僖也陳侯謂子貢曰吾乃今知聖人之可貴對曰君之知之可矣未若專其道而行其化之善也秋季桓子病輦而見魯城喟然嘆曰昔此國幾興矣以吾獲罪於孔子故不興也顧謂其嗣康子曰我即死若必相魯必召仲尼後數日桓子卒康子代立已𦵏欲召仲尼公之魚曰昔吾先君用之不終終為諸侯笑今又用之不能終是再為諸侯笑康子曰則誰召而可曰必召冉求於是使使召冉求冉求將行孔子曰魯人召求非小用之將大用之也是日孔子曰歸與歸與吾黨之小子狂簡斐然成章不知所以裁之子貢知孔子思歸送冉求因誡曰即用以孔子為招云庚戌魯哀公四年年六十一自陳適蔡辛亥魯哀公五年年六十二自蔡如葉葉公問政孔子曰近者説逺者來葉公因語孔子曰吾黨有直躬者其父攘羊而子證之孔子曰吾黨之直者異於是父為子隱子為父隱直在其中矣他日葉公問孔子於子路子路不對孔子聞之曰爾奚不曰其為人也發憤忘食樂以忘憂不知老之將至云爾去葉反於蔡長沮桀溺耦而耕孔子過之使子路問津焉長沮曰夫執輿者為誰曰為孔丘曰是魯孔丘與曰然曰是知津矣桀溺曰子為誰曰為仲由曰是魯孔丘之徒與曰然曰滔滔者天下皆是也而誰以易之且而與其從辟人之士也豈若從辟世之士哉耰而不輟子路行以告夫子憮然曰鳥獸不可與同羣吾非斯人之徒與而誰與天下有道丘不與易也子路從而後遇荷蓧丈人曰子見夫子乎丈人曰四體不勤五穀不分孰為夫子植其杖而芸子路拱而立止子路宿殺雞為黍而食之見其二子焉明日子路行以告孔子曰隱者也使子路反見之至則行矣子路曰不仕無義長㓜之節不可廢也君臣之義如之何其廢之欲潔其身而亂大倫君子之仕也行其義也道之不行已知之矣壬子魯哀公六年年六十三呉伐陳楚昭王救陳軍於城父聞孔子在陳蔡之間楚使人聘孔子孔子將往從之陳蔡大夫謀曰孔子賢者所刺譏皆中諸侯之疾今者久留陳蔡之間諸大夫所設行皆非仲尼之意今楚大國也來聘孔子孔子用於楚則陳蔡用事大夫危矣於是乃相與發徒役圍孔子於野不得行絶糧從者病莫能興孔子講誦絃歌不衰子路愠見曰君子亦有窮乎孔子曰君子固窮小人窮而濫矣孔子知弟子有愠心乃召子路而問曰詩云匪兕匪虎率彼曠野吾道非耶吾何為於此子路曰意者吾未仁耶人之不我信也意者吾未知耶人之不我行也孔子曰有是乎由譬使仁者而必信安有伯夷叔齊使知者而必行安有王子比干夫遇不遇者時也君子博學深謀而不遇者特衆矣何獨丘哉且芝蘭生於深林不以無人而不芳君子脩道立德不謂窮困而改節為之者人也生死者命也子路出子貢入見孔子曰詩云匪兕匪虎率彼曠野吾道非耶吾何為於此子貢曰夫子之道至大也故天下莫能容夫子夫子盍少貶焉孔子曰賜良農能稼而不能為穡良工能巧而不能為順君子能脩其道綱而紀之統而理之而不能為容今爾不脩爾道而求為容而志不逺矣子貢出顔回入見孔子曰詩云匪兕匪虎率彼曠野吾道非耶吾何為於此顔回曰夫子之道至大故天下莫能容雖然夫子推而行不容何病不容然後見君子夫道之不修是吾醜也道既已大修而不用是有國者之醜也不容何病不容然後見君子孔子欣然而笑曰有是哉顔氏之子使爾多財吾為爾宰於是使子貢見楚昭王昭王以師迎孔子然後得免時陳蔡弟子從孔子者皆不及門故曰德行顔淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子游子夏皆升堂入室者也當時弟子學業者三千人高弟七十其尤賢者十人而已適楚中道有漁者而獻魚焉孔子不受漁者曰天暑市逺無所鬻也思慮棄之糞壌不如獻之君子故敢以進焉於是夫子再拜受之使弟子掃地將以烹祭門人曰彼將棄之而夫子以祭之何也孔子曰吾聞諸惜其腐餒而欲以務施者仁人之情也惡有受人之饋而無祭者乎昭王將以書社地七百里封孔子楚令尹子西曰王之使諸侯有如子貢者乎曰無有王之輔相有如顔回者乎曰無有王之將帥有如子路者乎曰無有王之官尹有如宰予者乎曰無有且楚之祖封於周號為子國五十里今孔丘述三王之法明周召之業王若用之則楚安得世世堂堂方數千里乎文王在豐武王在鎬百里之君卒王天下今孔丘得據土壤賢弟子為佐非楚之福也昭王乃止是嵗也有雲如衆赤鳥夾日以飛三日楚子使問諸周太史周太史曰其當王身乎若禜之可移於令尹司馬王曰除腹心之疾而寘諸股肱何益不榖不有大過天其夭諸有罪受罸又焉移之遂弗禜昭王有疾卜曰河為祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望江漢睢漳楚之望也禍福之至不是過也不穀雖不德河非所獲罪也遂弗祭孔子曰楚昭王知大道矣其不失國也宜哉夏書曰惟彼陶唐師彼天常有此冀方今失其行亂其紀綱乃滅而亡又曰允出兹在兹由已率常可矣秋楚子軫卒楚狂接輿歌而過孔子曰鳯兮鳯兮何德之衰往者不可諫來者猶可追已而己而今之從政者殆而孔子下欲與之言趨而辟之不得與之言自楚反乎衛遇舊館人之喪入而哭之哀出使子貢説驂而賻之子貢曰於門人之喪未有所説驂説驂於舊館無乃已重乎夫子曰予鄉者入而哭之遇於一哀而出涕予惡夫涕之無從也小子行之癸丑魯哀公七年年六十四在衛先時衛靈公死而世子蒯瞶入於戚蒯瞶之子出公輒立父子爭國孔子既至冉有曰夫子為衛君乎子貢曰諾吾將問之入曰伯夷叔齊何人也曰古之賢人也怨乎曰求仁而得仁又何怨出曰夫子不為也是時衛君欲得孔子為政子路謂孔子曰衛君待子而為政子將奚先子曰必也正名乎子路曰有是哉子之迂也奚其正子曰野哉由也君子於其所不知蓋闕如也名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罸不中刑罸不中則民無所措手足故君子名之必可言也言之必可行也君子於其言無所茍而已矣甲寅魯哀公八年年六十五在衛有送葬者而夫子觀之曰善哉為喪乎足以為法已小子識之子貢曰夫子何善爾也曰其往也如慕其反也如疑子貢曰豈若速反而虞乎子曰小子識之我未之能行也孔子昧旦晨興顔回侍側聞哭者之聲甚哀子曰囘女知此何所哭乎對曰回以此哭聲非但為死者而已又有生離别者也子曰何以知之對曰回聞恒山之鳥生四子焉羽翼既成將分於四海其母悲鳴而送之哀聲有似於此謂其往而不返也回竊以音類知之孔子使人問哭者果曰父死家貧賣子以葬與之長訣孔子曰回也善於識音矣衛將軍文子將立先君之廟於其家使子羔訪於孔子孔子曰公廟設於私家非古禮之所及吾弗知子羔曰敢問尊卑上下立廟之制可得聞乎爾孔子曰天下有王分地建國設祖宗乃為親䟽貴賤多少之數是故天子立七廟三昭三穆與太祖之廟而七太祖近廟皆月祭之逺廟為祧有二祧焉享嘗乃止諸侯立五廟二昭二穆與太祖之廟而五祖考廟享嘗乃止大夫立三廟一昭一穆與太祖之廟而三享嘗乃止士立一廟曰考廟王考無廟合而享嘗乃止庶人無廟四時祭於寢此自有虞以至於周之所不變也凢四代帝王之所謂郊者皆以配天其所謂禘者皆五年大祭之所及也應為太祖者則其廟不毁不及太祖雖所禘郊其廟則毁矣古者祖有功而宗有德諸見祖宗者其廟皆不毁子羔又問曰祭典云有虞氏祖顓頊而宗堯夏后氏亦祖顓頊而宗禹殷人祖契而宗湯周人祖文王而宗武王此四祖四宗或乃異代或其考祖之有功德其廟可也若有虞宗堯夏祖顓頊皆異代之有功德者也亦可以存其廟乎孔子曰善如女所問也如殷周之祖宗其廟可以不毁其他祖宗者功德不殊雖在殊代亦可以無疑矣詩云蔽芾甘棠勿剪勿伐召伯所憩周人之於召公也愛其人猶敬其所舎之樹况祖宗有功德而可以不尊奉其廟焉孔子問公叔文子於公明賈曰信乎夫子不言不笑不取乎公明賈曰以告者過也夫子時然後言人不厭其言樂然後笑人不厭其笑義然後取人不厭其取子曰其然豈其然乎乙夘魯哀公九年年六十六在衛衛司徒敬子卒孔子弔焉主人不哀夫子哭不盡聲而退蘧伯玉請曰衛鄙俗不習喪禮煩吾子辱焉相焉孔子許之掘中霤而浴毁竈而綴足襲於牀及葬毁宗躐行出於大門及墓男子西面婦人東面既封而歸殷道也孔子行之子游問曰君子行禮不求變俗夫子變之矣孔子曰非此之謂也喪事則從其質而已丙辰魯哀公十年年六十七在衛孔子編年巻三
