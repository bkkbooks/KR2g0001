body:
  text: 孔子編年𫝊記類一聖賢之屬提要臣等謹案孔子編年五巻舊本題宋胡舜陟撰考書首有紹興八年舜陟序乃自靜江罷歸之日命其子仔所撰非舜陟自作也舜陟字汝明績溪人大觀三年進士靖康間官侍御史南渡初知廬州有禦寇功更厯數鎮最後為廣西經略使欲為秦檜父建祠髙登不可因劾登以媚檜㑹以他事忤檜意亦逮治死於獄仔字元任後流寓呉興嘗輯詩話行於世即所謂苕溪漁隠者是也是書輯録孔子言行以論語春秋三𫝊禮記家語史記世家所載按嵗編排體例亦如年譜其不曰年譜而曰編年尊聖人也自周秦之間䜟緯雜出一切詭異神怪之説率託諸孔子大抵誕謾不足信仔獨依據經𫝊考尋事實大㫖以論語為主而附以他書其採掇頗為審慎惟諸書紀録聖言不能盡載其嵗月仔既限以編年不免時有牽合如左氏襄公二十一年鄭人游鄉校𫝊仲尼聞是語也云云杜預注謂仲尼於是十嵗長而後聞之知孔子為此言不當在是年也仔乃繋其事於十嵗之下殊為疎舛又禮記儒行篇對魯哀公云云則繫之六十八嵗哀公問篇大禮如何云云則又繫之七十二嵗不知何所據而云然此類尤失於穿鑿然由宋以後纂集聖蹟者其書日多亦猥雜日甚仔所論次猶為近古故録冠𫝊記之首以見濫觴所自焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀孔子編年原序聖人達而在上者制治之法成於周公聖人窮而在下者制行之法成於孔子周公之制度其詳見於周官之書與五經並行於世可得而考若夫孔子動而世為天下道行而世為天下法者雜出於春秋三傳禮記家語與夫司馬遷世家而又多偽妄惟論語為可信足以證諸家之是非余令小子仔采摭其可信者而為編年凡五巻起襄公二十二年訖哀公十六年自孔子始生而至於終言動出處亦畧具矣夫以天縱之將聖生乎亂世而時無賢君莫能用之故去魯凡十三年適衛者五適陳適蔡者再適曹適宋適鄭適葉適楚者一而復自衛反魯豈茍然哉所以或仕或處或久或速莫非翔而後集色斯舉矣然轍環天下卒老於行者天也非人也如天欲平治天下必有尊徳樂道之君出焉而吾夫子見用周公之事業復顯於當世矣故嘗嘆曰鳯鳥不至河不出圖吾已矣夫又曰甚矣吾衰也久矣吾不復夢見周公觀其為魯中都宰一年為司空二年為司㓂三年經文緯武更制定令内以移風易俗外以折衝禦侮而大邦震懼四方取則則夫子所謂茍有用我者期月而已可也豈欺我哉惜乎未嘗有所終三年淹也卒不見其有成豈非天乎當時游於諸侯有以致弟子之不説而起後世之疑者莫不以見南子從弗擾佛肸為非此蓋未之思也業已適其國而南子方用事欲見而不見則其取辱必有甚於見矣然使聖人屈已而見所不見是天之厄也違天不祥故曰予所否者天厭之弗擾佛肸之召欲往而卒不往者明聖人有可見之道欲為天下後世訓則不必往矣非從容中道者能之乎余嘗考論語鄉黨一篇見聖人動作威儀之則至纎至悉及其他篇見其所謂子之燕居申申夭夭子温而厲威而不猛子與人歌子所雅言之類皆弟子所記而聖人動容周旋中禮了然在人目前學者得以取法也今編年所書七十三年應世之行有出處去就之大節孟子所謂集大成金聲玉振聖智之事舉在是矣善學聖人者必有取於斯焉紹興八年三月壬子績溪胡舜陟序
