body:
  text: 孔子編年巻一宋胡仔撰孔子之先宋人也武王克商以商遺民封紂之子武庚以奉湯祀及武庚以管蔡叛成王命周公誅之以紂之庶兄微子啟為商後封于宋微子啟卒立其弟衍是為微仲微仲卒子宋公稽立宋公稽卒子丁公申立丁公申卒子湣公共立湣公共卒弟煬公熈立湣公長子曰弗父何何之弟鮒祀弑煬公以國授何何弗受鮒祀立是為厲公而何世為宋大夫其曾孫曰正考父考父之子曰孔父嘉孔父生時所賜號也子孫因以為氏為華父督所殺其子奔魯始為陬人孔子之曽大父曰孔防叔防叔生伯夏伯夏生叔梁紇以勇力聞于諸侯晚求婚於顔氏顔氏三女季曰徴在妻之生孔子庚戌魯襄公二十二年孔子生於魯平鄉陬邑初徵在禱於尼丘之山而生孔子故名之曰丘字仲尼為兒嬉戲常陳爼豆設禮容及長長九尺六寸人皆謂之長人辛亥魯襄公二十三年年二壬子魯襄公二十四年年三父叔梁紇卒葬於防山防山在魯東癸丑魯襄公二十五年年四弟子秦商生甲寅魯襄公二十六年年五乙卯魯襄公二十七年年六弟子顔路生丙辰魯襄公二十八年年七丁巳魯襄公二十九年年八戊午魯襄公三十年年九弟子仲由生已未魯襄公三十一年年十鄭人㳺于鄉校以論執政然明謂子産曰毁鄉校如何子産曰何為夫人朝夕退而游焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之我聞忠善以損怨不聞作威以防怨豈不遽止然猶防川大決所犯傷人必多吾不克止也不如小決使道不如吾聞而藥之也然明曰蔑也今而後知吾子之信可事也小人實不才若果行此其國實頼之豈唯一二臣孔子聞是語也曰以是觀之人謂子産不仁吾不信也庚申魯昭公元年年十一弟子漆雕開生辛酉魯昭公二年年十二壬戌魯昭公三年年十三癸亥魯昭公四年年十四甲子魯昭公五年年十五魯叔孫穆子初辟僑如之難奔齊及庚宗遇婦人使私為食而宿焉生子曰牛至齊娶於國氏生孟丙仲壬後穆子反魯以牛為豎有寵牛拘孟丙殺之仲壬奔齊穆子病豎牛弗饋食而卒豎牛立昭子而相之仲壬聞喪至自齊季孫欲立之南遺曰叔孫氏厚則季氏薄彼實亂家子勿與知不亦可乎南遺使國人助豎牛以攻諸大庫之庭司宫射之中目而死豎牛取東鄙三十邑以與南遺昭子即位朝其家衆曰豎牛禍叔孫氏使亂大從殺適立庶又披其邑將以赦罪罪莫大焉必速殺之豎牛懼奔齊孟仲之子殺諸塞關之外投其首於寧風之棘上孔子曰叔孫昭子不勞不可能也周任有言曰為政者不賞私勞不罰私怨詩云有覺徳行四國順之弟子閔損生乙丑魯昭公六年年十六丙寅魯昭公七年年十七丁卯魯昭公八年年十八戊辰魯昭公九年年十九娶于宋之幵官氏巳巳魯昭公十年年二十伯魚生昭公使人遺以鯉魚孔子榮君之賜因名之曰鯉字伯魚庚午魯昭公十一年年二十一辛未魯昭公十二年年二十二楚靈王汰侈右尹子革侍坐左史倚相趨過王曰是良史也子善視之是能讀三墳五典八索九丘對曰臣嘗問焉昔穆王欲肆其心周行天下將皆必有車轍馬跡焉祭公謀父作祈招之詩以止王心王是以獲没於祗宫臣問其詩而不知也若問逺焉其焉能知之王曰子能乎對曰能其詩曰祈招之愔愔式昭徳音思我王度式如玉式如金形民之力而無醉飽之心王揖而入饋不食寢不寐數日不能自克以及於難孔子曰古也有志克巳復禮仁也信善哉楚靈王若能如是豈其辱於乾谿楚工尹商陽與陳弃疾追吳師及之陳弃疾謂工尹商陽曰王事也子手弓而可手弓子射諸射之斃一人韔弓又及謂之又斃二人毎斃一人揜其目止其御曰朝不坐燕不與殺三人亦足以反命矣孔子曰殺人之中又有禮焉壬申魯昭公十三年年二十三癸酉魯昭公十四年年二十四晉邢侯與雍子争鄐田久而無成士景伯如楚叔魚攝理韓宣子命斷舊獄罪在雍子雍子納其女於叔魚叔魚蔽罪邢侯邢侯怒殺叔魚與雍子於朝宣子問其罪於叔向叔向曰三人同罪施生戮死可也雍子自知其罪而賂以買直鮒也鬻獄邢侯專殺其罪一也已惡而掠美為昏貪以敗官為墨殺人不忌為賊夏書曰昏墨賊殺皋陶之刑也請從之乃施邢侯而尸雍子與叔魚於市孔子曰叔向古之遺直也治國制刑不隠於親三數叔魚之惡不為末減曰義也夫可謂直矣平丘之㑹數其賄也以寛衛國晉不為暴歸魯季孫稱其詐也以寛魯國晋不為虐邢侯之獄言其貪也以正刑書晋不為頗三言而除三惡加三利殺親益榮猶義也夫母顔氏卒孔子少孤不知父墓乃殯其母於五父之衢人之見之者皆以為𦵏也其慎也盖殯也問於陬曼父之母然後得合𦵏於防甲戌魯昭公十五年年二十五孔子合𦵏母於防曰吾聞之古也墓而不墳今丘也東西南北之人也不可以弗識也於是封之崇四尺孔子先反門人後雨甚至孔子問焉曰爾來何遲也曰防墓崩孔子不應三孔子泫然流涕曰吾聞之古不修墓乙亥魯昭公十六年年二十六孔子母喪既祥五日彈琴而不成聲十日而成笙歌丙子魯昭公十七年年二十七郯子来朝昭公與之宴昭子問焉曰少皞氏鳥名官何故也郯子曰吾祖也我知之昔者黄帝氏以雲紀故為雲師而雲名炎帝氏以火紀故為火師而火名共工氏以水紀故為水師而水名大皞氏以龍紀故為龍師而龍名我髙祖少皞摯之立也鳯鳥適至故紀於鳥為鳥師而鳥名鳯鳥氏厯正也𤣥鳥氏司分者也伯趙氏司至者也青鳥氏司啟者也丹鳥氏司閉者也祝鳩氏司徒也鴡鳩氏司馬也鳲鳩氏司空也爽鳩氏司冦也鶻鳩氏司事也五鳩鳩民也者五雉為五工正利器用正度量夷民者也九扈為九農正扈民無滛者也自顓頊以來不能紀逺乃紀於近為民師而命以民事則不能故也孔子聞之見於郯子而學之既而告人曰吾聞之天子失官學在四夷猶信遂之郯遭程子於塗傾蓋而語終日甚相親顧謂子路曰取束帛贈先生子路屑然對曰由聞之士不中間見女嫁無媒君子不以交禮也有間又顧謂子路子路又對如初孔子曰由詩不云乎有美一人清揚婉兮邂逅相遇適我願兮今程子天下賢士也於斯不贈則終身弗能見也小子行之丁丑魯昭公十八年年二十八孔子射於矍相之圃蓋觀者如堵墻射至於司馬使子路執弓矢出延射者賁軍之將亡國之大夫與為人後者不入其餘皆人蓋去者半入者半又使公罔之裘序㸃揚觶而語公罔之裘揚觶而語曰㓜壯孝弟耆耋好禮不從流俗脩身以俟死者不在此位也蓋去者半處者半序㸃又揚觶而語曰好學不倦好禮不變旄期稱道不亂者不在此位也蓋僅有存者戊寅魯昭公十九年年二十九在魯弟子冉求商瞿梁鱣生已卯魯昭公二十年年三十在魯齊景公與晏嬰來適魯景公問孔子曰昔秦穆公國小處辟其霸何也對曰秦國雖小其志大處雖辟行中正身舉五羖爵之大夫起纍紲之中與語三日授之以政以此取之雖王可也其霸小矣景公說衛宗魯由齊豹事公孟縶齊豹將殺公孟縶宗魯知而弗告及難作死之琴張將往弔之孔子曰齊豹之盜而孟縶之賊女何弔焉君子不食姦不受亂不為利疚於回不以回待人不蓋不義不犯非禮齊侯田于沛招虞人以弓不進公使執之辭曰昔我先君之田也旃以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍之孔子曰守道不如守官君子韙之鄭子産有疾謂子大叔曰我死子必為政唯有徳者能以寛服人其次莫如猛夫火烈民望而畏之故鮮死焉水懦弱民狎而翫之則多死焉故寛難疾數月而卒大叔為政不忍猛而寛鄭國多盜取人於萑苻之澤大叔悔之曰吾早從夫子不及此興徒兵以攻萑苻之盜盡殺之盜少止仲尼曰善哉政寛則民慢慢則糾之以猛猛則民殘殘則施之以寛寛以濟猛猛以濟寛政是以和詩曰民亦勞止汔可小康惠此中國以綏四方施之以寛也毋從詭隨以謹無良式遏㓂虐慘不畏明糾之以猛也柔逺能邇以定我王平之以和也又曰不競不絿不剛不柔布政優優百禄是遒和之至也及子産卒孔子聞之出涕曰古之遺愛也弟子髙柴巫馬施生庚辰魯昭公二十一年年三十一在魯魯有儉嗇者瓦鬲煑食食之自謂其美盛之土型之器以進孔子孔子受之歡然而悅如受太牢之饋子路曰瓦甂陋器也煑食薄膳也夫子何喜之如此乎子曰夫好諫者思其君食美者念其親吾非以饌具之為厚以其食厚而思我焉弟子端木賜生辛已魯昭公二十二年年三十二在魯魯人有獨處室者隣之婺矛牙婦亦獨處一室夜暴風雨至婺矛牙婦室壊趨而託焉魯人閉户而不納婺矛牙婦自牖與之言子何不仁而不納我乎魯人曰吾聞男女不六十不同居今子㓜吾亦㓜是以不敢納爾也婦人曰子何不如栁下惠然嫗不逮門之女國人不稱其亂魯人曰桞下惠則可吾固不可吾將以吾之不可學栁下惠之可孔子聞之曰善哉欲學栁下惠者未有似於此者期於至善而不襲其為可不謂智乎壬午魯昭公二十三年年三十三在魯癸未魯昭公二十四年年三十四魯大夫孟僖子將死召其大夫而屬之曰禮人之幹也無禮無以立吾聞將有達者曰孔丘聖人之後也而滅於宋其祖弗父何以有宋而授厲公及正考父佐戴武宣三命茲益共故其鼎銘云一命而僂再命而傴三命而俯循牆而走亦莫余敢侮饘於是粥於是以餬余口其共也如是臧孫紇有言曰聖人有眀徳者若不當世其後必有達人今其將在孔丘乎我若獲没必屬説與何忌於夫子使事之而學禮焉以定其位故孟懿子與南宫敬叔師事孔子孔子曰能補過者君子也詩曰君子是則是效孟懿子可則效已矣南宫适問於孔子曰羿善射奡盪舟俱不得其死然禹稷躬稼而有天下夫子不答南宫适出孔子曰君子哉若人尚徳哉若人孔子謂南宫敬叔曰吾聞老耼博古知今通禮樂之原明道徳之歸則吾師也今將往矣對曰謹受命遂言於魯君曰孔子將適周觀先王之遺制考禮樂之所極斯大業也君盍以乗資之臣請與俱往魯君予一乘車兩馬一䜿子侍御敬叔與俱至周問禮於老耼訪樂於萇𢎞歴郊社之所考明堂之則察廟朝之度於是喟然曰吾乃今知周公之聖與周之所以王也孔子將問禮於老耼耼曰子所言者其人與骨皆已朽矣獨其言在耳且君子得其時則駕不得其時則蓬累而行吾聞之良賈深藏若虛君子盛徳容貌若愚去子之驕氣與多慾態色與滛志是皆無益於子之身吾所以告子者若是而已孔子出謂弟子曰鳥吾知其能飛魚吾知其能游獸吾知其能走走者可以為罔游者可以為綸飛者可以為矰至於龍吾不能知其乘風雨而上天吾今日見老子其猶龍邪孔子觀周明堂覩四門墉有堯舜之容桀紂之象而各有善惡之狀興廢之誡焉又有周公相成王抱之負斧扆南面以朝諸侯之圗焉孔子徘徊而望之謂從者曰此周之所以盛也夫明鏡所以察形往古所以知今人主不務襲迹於所以安存而急急所以危亡是猶却走而欲求及前人也豈不惑哉孔子觀周遂入太祖后稷之廟廟堂右階之前有金人焉三緘其口而銘其背曰古之慎言人也戒之哉無多言多言多敗無多事多事多患安樂必戒無行所悔勿謂何傷其禍將長勿謂何害其禍將大勿謂不聞神將伺人焰焰不滅炎炎若何涓涓不壅終成江河綿綿不絶或成網羅毫末不札將尋斧柯誠能慎之福之根也口是何傷禍之門也強梁者不得其死好勝者必遇其敵盜憎主人民怨其上君子知天下之不可上也故下之知衆人之不可先也故後之温恭慎徳使人慕之執雌持下人莫踰之人皆趨彼我獨守此人皆惑之我獨不徙内藏我智不示人技我雖尊髙人弗我害誰能於此江海雖左長於百川以其卑也天道無親而能下人戒之哉孔子既讀斯文也顧謂弟子曰小子識之此言實而中情而信詩曰戰戰兢兢如臨深淵如履薄氷行身如此豈以口過患哉伯常騫問於孔子曰騫固周之賤史也不自以不肖將北面以事君子敢問正道宜行不容於世隱道宜行然亦不忍今欲身亦不窮道亦不隱為之有道乎孔子曰善哉子之問也自丘之聞未有若吾子所問辯且説也丘嘗聞君子之言道矣聴者無察則道不入竒偉不稽則道不信又嘗聞君子之言事矣制無度量則事不成其政曉察則民不保又嘗聞君子之言志矣剛折者不終徑易者則數傷浩倨者則不親就利者則無不弊又嘗聞養世之君子矣從輕勿為先從重勿為後見像而勿强陳道而勿佛此四者某之所聞也孔子將去周老耼問送之曰吾聞富貴者送人以財仁人者送人以言吾不能富貴竊仁人之號送子以言曰聰明深察而近於死者好議人者也博辨廣大危其身者發人之惡者也為人子者毋以有已為人臣者毋以有已孔子自周反於魯弟子稍益進焉甲申魯昭公二十五年年三十五季平子與郈昭伯以鬭雞故得罪魯昭公昭公率師擊平子平子與孟氏叔孫氏三家共攻昭公昭公師敗奔於齊齊處昭公乾侯魯亂孔子適齊中路聞哭者之聲其音甚哀孔子謂其僕曰此哭哀則哀矣然非喪者之哀矣驅而前少進見有異人焉擁鐮帶索哭者不衰孔子下車追而問曰子何人也對曰吾丘吾子也曰子非喪之所奚哭之悲也丘吾子曰吾有三失晚而自覺悔之何及曰三失可得聞乎願子告吾無隠也丘吾子曰吾少時好樂周遍天下後還喪吾親是一失也長事齊君君驕奢失士臣節不遂是二失也吾平生厚交而今皆離絶是三失也夫樹欲静而風不停子欲養而親不待徃而不來者年不可再見者親也請從此辭也遂投水而死孔子曰小子識之斯足為戒矣自是弟子辭歸養親者十有三孔子至齊為髙昭子家臣欲以通乎景公景公問政孔子曰君君臣臣父父子子景公曰善哉信如君不君臣不臣父不父子不子雖有粟吾得而食諸是時景公失政其大夫田氏厚施以奪其民而公不悟故孔子及之它日又復問政於孔子孔子曰政在節財景公説孔子去齊舍於外館景公造焉賔主之辭既接而左右白曰周使適至言先王廟災景公覆問災何王之廟也孔子曰此必釐王之廟公曰何以知之孔子曰詩云皇皇上天其命不忒天之以善必報其徳禍亦如之夫釐王變文武之制而作𤣥黄華麗之餙宫室崇峻輿馬奢侈而弗可振也故天殃所宜加其廟焉以是占之為然公曰天何不殃其身而加罰其廟也孔子曰蓋以文武故也若殃其身則文武之嗣無乃殄乎故當殃其廟以彰其過俄頃左右報曰所災者釐王廟也景公驚起再拜曰善哉聖人之智過人逺矣子聞韶三月不知肉味曰不圖為樂之至於斯也乙酉魯昭公二十六年年三十六在齊齊髙庭問於孔子曰庭不廣交不擇地攘袂而執贄静氣以問事君子之道願夫子告之孔子曰貞以幹之敬以輔之施仁無倦見君子則舉之見小人則退之去汝惡心而忠與之效其行脩其禮千里之外親如兄弟行不效禮不脩則對門不汝通矣夫終日言不遺已之憂終日行不遺已之患唯智者能之故自脩者必恐懼以除患恭儉以避難者也終身為善一行則敗之可不慎乎弟子樊須生丙戌魯昭公二十七年年三十七在齊呉延陵季子適齊於其反也其長子死葬於嬴博之間孔子曰延陵季子呉之習於禮者也徃而觀其葬焉其坎深不至於泉其斂以時服既葬而封廣輪揜坎其髙可隠也既封左袒右還其封且號者三曰骨肉歸復於土命也若魂氣則無不之也無不之也而遂行孔子曰延陵季子之於禮也其合矣乎丁亥魯昭公二十八年年三十八晉韓宣子卒魏獻子為政分祁氏之田以為七縣分羊舌氏之田以為三縣司馬彌牟為鄥大夫賈辛為祁大夫司馬烏為平陵大夫魏戊為梗陽大夫知徐吾為塗水大夫韓固為焉首大夫孟丙為孟大夫樂霄為銅鞮大夫趙朝為平陽大夫僚安為楊氏大夫謂賈辛司馬烏為有力於王室故舉之謂知徐吾趙朝韓固魏戊餘子之不失職能守業者也其四人者皆受縣而後見於魏子以賢舉也賈辛將適其縣見於魏子魏子曰辛來昔叔向適鄭鬷蔑惡欲觀叔向從使之收器者而徃立於堂下一言而善叔向將飲酒聞之曰必鬷眀也下執其手以上曰昔賈大夫悪娶妻而美三年不言不笑御以如臯射雉獲之其妻始笑而言賈大夫曰才之不可以巳我不能射女遂不言不笑夫今子少不颺子若無言吾幾失子矣言之不可以已也如是遂如故知今女有力於王室吾是以舉女行乎敬之哉毋墮乃力孔子聞魏子之舉也以為義曰近不失親逺不失舉可謂義矣又聞其命賈辛也以為忠詩曰永言配命自求多福忠也魏子之舉也義其命也忠其長有後於晉國乎戊子魯昭公二十九年年三十九在齊晉趙鞅荀寅帥師城汝濵遂賦晉國一鼓鐵以鑄刑鼎著范宣子所為刑書焉孔子曰晉其亡乎失其度矣夫晉國將守唐叔之所受法度以經緯其民卿大夫以序守之民是以能尊其貴貴是以能守其業貴賤不愆所謂度也文公是以作執秩之官為被廬之法以為盟主今弃是度也而為刑鼎民在鼎矣何以尊貴貴何業之守貴賤無序何以為國且夫宣子之刑夷之蒐也晉國之亂制也若之何以為法弟子顔回澹臺滅明生已丑魯昭公三十年年四十在齊弟子陳亢生庚寅魯昭公三十一年年四十一在齊齊大旱春饑景公問於孔子曰如之何孔子曰凶年則乗駑馬力役不興馳道不脩祈以幣玉祭事不懸祀以下牲此則賢君自貶以救民之禮也辛卯魯昭公三十二年年四十二齊景公將以尼谿田封孔子晏嬰進曰夫儒者滑稽而不可軌法倨傲自適不可以為下崇喪遂哀破産厚葬不可以為俗游説乞貸不可以為國自大賢之息周室既衰禮樂缺弛今孔子盛容飾繁登降之禮趨詣之節累世不能殚其學當年不能究其禮君欲用之以移齊俗非所以先細民也後景公見孔子不敬商其禮曰待子以季氏吾不能以季孟之間待之齊大夫猶欲害孔子孔子聞之欲去景公亦曰吾老矣不能用也孔子遂行反乎魯弟子公西華生壬辰魯定公元年年四十三在魯齊有一足之鳥飛集於朝舒翅而跳齊侯怪之使使聘魯問孔子孔子曰此鳥名曰商羊水祥也昔童兒有屈其一脚振迅兩肩而跳且謡曰天將大雨商羊鼔儛今齊有之其應至矣急告民趨治溝渠脩隄防將有大水為灾頃之大霖雨水溢泛諸國傷害民人唯齊有備不敗景公曰聖人之言信有徵矣弟子有若生孔子編年巻一
