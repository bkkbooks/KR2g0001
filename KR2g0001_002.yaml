body:
  text: 孔子編年卷二宋胡仔撰癸已魯定公二年年四十四在魯弟子卜商生甲午魯定公三年年四十五在魯二月辛卯邾莊公卒隱公即位將冠使大夫因孟懿子問禮於孔子孔子曰其禮如世子之冠冠於阼階以著代也醮於客位加有成也三加彌尊喻其志也冠而字之敬其名也雖天子之元子猶士也其禮無變天下無生而貴者故也行冠事必於祖廟以祼享之禮以將之以金石之樂節之所以自卑而尊先祖示不敢擅懿子曰天子未冠即位長亦冠也孔子曰古者王世子雖幼其即位則尊為人君人君治成人之事者何冠之有懿子曰然則諸侯之冠異天子與孔子曰君薨而世子主喪是亦冠也巳人君所無殊也懿子曰今邾君之冠非禮也孔子曰諸侯之有冠禮也夏之末造也有自來矣今無譏焉天子冠者武王崩成王年十有三而嗣立周公居冡宰攝政以治天下明年夏六月既葬冠成王而朝於祖以見諸侯亦有君也周公命祝雍作頌曰祝王達而棄幼祝雍辭曰使王近於民逺於年嗇於時惠於財親賢而任能其頌曰令月吉日王始加元服去王幼志心衮職欽若昊天六合是式率爾祖考永永無極此周公之制也懿子曰諸侯之冠其所以為賔主何也孔子曰公冠則以卿為賔無介公自為主迎賔揖升自阼立於席比其禮也則如士饗之以三獻之禮既醴降自阼諸侯非公而自為主者其所以異皆降自西階𤣥端與皮辨異朝服素韠公冠四加𤣥冕祭其酬幣於賔則束帛乘馬王太子庶子之冠擬焉皆天子自為三其禮與士無變饗食賔也皆同懿子曰始冠必加緇布之冠何也孔子曰示不忘古太古冠布齊則緇之其緌也吾未之聞今則冠而敝之可也懿子曰三王之冠其異何也孔子曰周辨殷冔夏收一也三王共皮辨素積委貌周道也章甫殷道也毋追夏后氏之道也仲弓為季氏宰問政子曰先有司赦小過舉賢才曰焉知賢才而舉之曰舉爾所知爾所不知人其舍諸魯人為長府閔子騫曰仍舊貫如之何何必改作子曰夫人不言言必有中弟子言偃生乙未魯定公四年年四十六在魯觀魯桓公廟有攲器焉孔子問於守廟者曰此謂何器對曰此蓋為宥坐之器虛則攲中則正滿則覆明君以為至誡故常置之於坐側顧謂弟子曰試注水焉乃注之水中則正滿則覆夫子喟然嘆曰嗚呼夫物惡有滿而不覆哉子路進曰敢問持滿有道乎子曰聰明睿智守之以愚功被天下守之以讓勇力振世守之以怯富有四海守之以謙此所謂損之又損之之道也弟子曽參生丙辛魯定公五年年四十七在魯季桓子穿井得土缶中若羊以問孔子曰得狗孔子曰以丘所聞羊也丘聞之木石之怪䕫罔閬水之怪龍罔象土之怪墳羊也季氏將伐顓臾冉有季路見於孔子曰季氏將有事於顓臾孔子曰求無乃爾是過與夫顓臾昔者先王以為東蒙主且在邦域之中矣是社稷之臣也何以伐為冉有曰夫子欲之吾二臣者皆不欲也孔子曰求周任有言曰陳力就列不能者止危而不持顛而不扶則將焉用彼相矣且爾言過矣虎兕出於柙龜玉毁於櫝中是誰之過與冉有曰今夫顓臾固而近於費今不取後世必為子孫憂孔子曰求君子疾夫舍曰欲之而必為之辭丘也聞有國有家者不患寡而患不均不患貧而患不安蓋均無貧和無寡安無傾夫如是故逺人不服則修文德以來之既來之則安之今由與求也相夫子逺人不服而不能來也邦分崩離析而不能守也而謀動干戈於邦內吾恐季孫之憂不在顓臾而在蕭牆之內也季桓子嬖臣曰仲梁懷與陽虎有隙陽虎欲逐懷公山不狃止之其秋懷益驕陽虎執懷桓子怒陽虎因囚季桓子盟而釋之陽虎自此益輕季氏陽虎欲見孔子而惡無禮大夫有賜於士不得受之其家則往拜其門陽虎時孔子之亡也而饋孔子蒸豚孔子亦時其亡也而往拜之遇諸塗謂孔子曰來豫與爾言曰懷其寶而迷其邦可謂仁乎曰不可好從事而亟失時可謂智乎曰不可日月逝矣嵗不我與孔子曰諾吾將仕矣魯君臣上下皆失其正故孔子不仕退而修詩書禮樂曰加我數年五十以學易可以無大過矣弟子至自逺方學業者益衆互鄉難與言童子見門人惑子曰與其進也不與其退也唯何甚人潔已以進與其潔也不保其往也丁酉魯定公六年年四十八在魯闕黨童子將命或問之曰益者與子曰吾見其居於位也見其與先生並行也非求益者也欲速成者也孔子之故人曰原壤其母死夫子助之沐槨原壤登木曰久矣豫之不託於音也歌曰貍首之斑然執女手之卷然夫子為弗聞也者而過之從者曰子未可以已乎夫子曰丘聞之親者毋失其為親也故者毋失其為故也弟子顓孫師生戊戌魯定公七年年四十九在魯定公問於孔子曰二三大夫皆勸寡人使隆敬於髙年何也孔子對曰君之及此言將天下實賴之豈唯魯哉公曰何也其義可得聞乎孔子曰昔者有虞氏貴德而尚齒夏后氏貴爵而尚齒殷人貴富而尚齒周人貴親而尚齒虞夏殷周天下之盛王也未有遺年者焉年之貴於天下久矣次於事親是故朝廷同爵則尚齒七十杖於朝君問則席八十則不俟朝君問則就之而悌達乎朝廷矣其行也肩而不並不錯則隨班白者不以其任行於道路而悌達乎道路矣居鄉以齒而老窮不遺强不犯弱衆不暴寡而悌逹乎州巷矣古之道五十不為甸役頒禽隆之長者而悌達乎搜狩矣軍旅什伍同爵則尚齒而悌達乎軍旅矣夫聖王之教孝悌發諸朝廷行於道路至於州巷放於搜狩循於軍旅則衆感以義死而弗敢犯公曰善哉孔子之畜狗死使子貢埋之曰吾聞之也敝帷不棄為埋馬也敝蓋不棄為埋狗也丘也貧無蓋於其封也亦豫之席毋使其首陷焉魯公索氏將祭而亡其牲孔子聞之曰公索氏不及二年將亡後一年而亡門人問曰昔公索氏亡其祭牲而夫子曰不及二年必亡今過期而亡夫子何以知其然孔子曰夫祭者孝子所以自盡於其親將祭而亡其牲則其餘所亡者多矣若此而不亡者未之有也弟子宓不齊生己亥魯定公八年年五十在魯陽虎將殺三桓不克出奔齊公山不狃為費宰不得志於季氏與虎同惡以費叛召孔子孔子欲往子路不說孔子曰夫召我者而豈徒哉如有用我者吾其為東周乎然卒不行時陽虎奔齊故孔子曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出自諸侯出蓋十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣叔孫武叔語大夫於朝曰子貢賢於仲尼子服景伯以告子貢子貢曰譬之宫牆賜之牆也及肩窺見室家之好夫子之牆數仭不得其門而入不見宗廟之美百官之富得其門者或寡矣夫子之云不亦宜乎叔孫武叔毁仲尼子貢曰無以為也仲尼不可毁也他人之賢者丘陵也猶可踰也仲尼日月也無得而踰焉人雖欲自絶其何傷於日月乎多見其不知量也魯用天子禮樂而季氏僭用於家故孔子曰八佾舞於庭是可忍也孰不可忍也三家者以雍徹子曰相維辟公天子穆穆奚取於三家之堂讀易韋編三絶為彖象文言繫辭以發其祕夫叙書則斷堯典論詩則首周南約魯史而修春秋贊易道而黜八索皆因前聖之事以立先王之教故曰述而不作信而好古竊比於我老彭弟子叔仲㑹冉儒曹恤伯虔生庚子魯定公九年年五十一定公以孔子為中都宰制為養生送死之節長幼異食强弱異任男女别塗道無拾遺器不雕僞為四寸之棺五寸之槨因丘陵為墳不封不樹行之一年而四方之諸侯則焉定公謂孔子曰學子此法以治魯國何如孔子對曰雖天下可也何但魯國而已哉陽虎既奔齊復奔晉適趙氏孔子聞之謂子路曰趙氏其世有亂乎子路曰權不在焉豈能為亂孔子曰非汝所知夫陽虎親富而不親仁有寵於季氏又將殺之不克而奔求容於齊齊人囚之乃亡歸晉是齊魯二國巳去其疾趙簡子好利而多信必溺其說而從其謀禍敗所終非一世可知也季平子卒將以君之璵璠斂贈以珠玉孔子聞之歷級而救焉曰送而以寶玉是猶暴尸於中原也其示民以姦利之端而有害於死者安用之且孝子不順情以危親忠臣不兆姦以陷君乃止孔子嘗助祭入太廟每事問或曰孰謂鄹人之子知禮乎入太廟每事問子聞之曰是禮也辛丑魯定公十年年五十二孔子由中都宰為司空乃别五土之性而物各得其所生之宜由司空為大司冦斷獄訟皆進衆議者而問之曰子以為奚若某以為何若皆曰云云如是然後夫子曰當從某子幾是時有父子訟者夫子同陛執之三月不别其父請止夫子赦之焉季孫聞之不說曰司寇欺余曩告余曰國家必先以孝余今戮一不孝以教民孝不亦可乎而又赦何哉冉有以告孔子孔子喟然嘆曰嗚呼上失其道而殺其下非理也不教以孝而聼其獄是殺不辜也三軍大敗不可斬也獄犴不治不可刑也何者上教之不行罪不在民故也夫慢令謹誅賊也徵斂無時暴也不試責臣虐也政無此三者然後刑可即也書云義刑義殺勿庸以次汝封惟曰未有遜事言必教而後刑也既陳道德以先服之而猶不可尚賢以勸之又不可即廢之又不可而後以威憚之若是三年而百姓正矣其有邪民不從化者然後待之以刑則民咸知罪矣詩云天子是毗俾民不迷是以威厲而不試刑錯而不用今世則不然亂其教繁其刑使民迷惑而陷焉又從而制之故刑彌繁而道不勝也夫三尺之限空車不能登者何哉峻故也百仭之山重載陟焉何哉陵遲故也今世俗之陵遲久矣雖有刑法民能勿踰乎孔子見季桓子季桓子不說孔子又見之宰豫進曰昔豫也嘗聞諸夫子曰王公不我聘則弗動今夫子之於司寇也日少而屈節數矣不可已乎孔子曰然魯國以衆相陵也以兵相暴之日久矣而有司不治則將亂也其聘我者孰大於是哉魯人聞之曰聖人將治何不先自逺刑罰自此之後國無爭者先時季氏葬昭公於墓道之南孔子溝而合諸墓謂季桓子曰貶君以彰巳罪非禮也今合之所以掩夫子之不臣定公春及齊平夏齊大夫黎鉏言於景公曰魯用孔丘其勢危齊乃使使告魯為好㑹之於夾谷魯定公將以乘車好往孔子攝相事曰臣聞有文事必有武備有武事者必有文備古者諸侯出疆必具官以從請具左右司馬定公許之犁彌言於齊侯曰孔丘好禮而無勇若使萊人以兵劫魯侯必得志焉齊侯從之至㑹所為壇位土階三等以遇禮相見遜揖而登獻酢既畢齊使萊人以兵鼓譟劫定公孔子歷階而進以公對曰士兵之兩君好合而裔夷之俘以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不逼好於神為不祥於德為愆義於人為失禮君必不然齊侯心怍麾之避而有頃齊奏宫中之樂徘優侏儒戲於前孔子趨進歷階而上不盡一等曰匹夫熒惑諸侯者罪應誅請右司馬加刑焉於是斬侏儒手足異處齊侯懼有慚色將盟齊人加載書曰齊師出境而不以甲車三百乘從我者有如此盟孔子使兹無還對曰而不返我汶陽之田吾以供命者亦如之齊侯將享公孔子謂梁丘據曰齊魯之故吾子何不聞焉事既成矣而又享之是勤執事且犧象不出門嘉樂不野合享而既具是棄禮也若其不具是用粃稗也用粃稗君辱棄禮名惡子盍圖之夫享所以昭德也不昭不如其已也乃不果享齊侯歸責其羣臣曰魯以君子之道輔其君而子獨以夷狄之道教寡人使得罪於魯君奈何有司進曰君子有過則謝以質小人有過則謝以文君若悼之則謝以實於是齊侯乃歸我鄆歡龜隂之田壬寅魯定公十一年年五十三孔子與於蠟賔事畢出遊於觀之上喟然而嘆孔子之嘆蓋嘆魯也言偃在側曰君子何嘆孔子曰大道之行也與三代之英丘未之逮也而有志焉大道之行也天下為公選賢與能講信修睦故人不獨親其親不獨子其子使老有所終壯有所用幼有所長矜寡孤獨廢疾者皆有所養男有分女有歸貨惡其弃於地也不必藏於已力惡其不出於身也不必為已是故謀閉而不興盜竊亂賊而不作故外户而不閉是謂大同今大道既隱天下為家各親其親各子其子貨力為己大人世及以為禮城郭溝池以為固禮義以為紀以正君臣以篤父子以睦兄弟以和夫婦以設制度以立田里以賢勇智以功為已故謀用是作而兵由此起禹湯文武成王周公由此其選也此六君子者未有不謹於禮者也以著其義以考其信著有過刑仁講讓示民有常如有不由此者在藝者去衆以為殃是謂小康言偃復問曰如此乎禮之急也孔子曰夫禮先王以承天之道以治人之情故失之者死得之者生詩云相鼠有體人而無禮人而無禮胡不遄死是故夫禮必本於天殽於地列於鬼神達於喪祭射御冠昏朝聘故聖人以禮示之故天下國家可得而正也言偃復問曰夫子之極言禮也可得而聞與孔子曰我欲觀夏道是故之把而不足徵也吾得夏時焉我欲觀殷道是故之宋而不足徵也吾得坤乾焉坤乾之義夏時之等吾以是觀之夫禮之初始諸飲食其燔黍捭豚汙尊而抔飲蕢桴而土鼓猶若可以致其敬於鬼神及其死也升屋而號告曰臯某復然後飯腥而苴孰故天望而地藏也體魄則降知氣在上故死者北首生者南鄉皆從其初昔者先王未有宫室冬則居營窟夏則居橧巢未有火化食草木之實鳥獸之肉飲其血茹其毛未有麻絲衣其羽皮後聖有作然後修火之利范金合土以為臺榭宫室牖户以炮以燔以烹以炙以為醴酪治其麻絲以為布帛以養生送死以事鬼神上帝皆從其朔故𤣥酒在室醴盞在户粢醍在堂澄酒在下陳其犧牲備其鼎俎列其瑟琴管磬鐘鼓修其祝嘏以降上神與其先祖以正君臣以篤父子以睦兄弟以齊上下夫婦有所是謂承天之祜作其祝號𤣥酒以祭薦其血毛腥其俎熟其殽與其越席疏布以幂衣其浣布醴盞以獻薦其燔炙君與夫人交獻以嘉魂魄是謂合莫然後退而合亨體其犬豕牛羊實其簠簋籩豆鉶羮祝以孝告嘏以慈告是謂大祥此禮之大成也弟子公孫龍生癸卯魯定公十二年年五十四孔子為司寇言於定公曰臣無藏甲大夫無百雉之城今三家過制請皆損之乃使仲由為季氏宰將墮三都於是叔孫氏墮郈季氏將墮費公山不狃叔孫輒帥費人以襲魯公與三子入於季氏之宫登武子之臺費人攻之弗克入及公側仲尼命申句須樂頎下伐之費人北國人追之敗諸姑蔑二子奔齊遂墮費將墮成公斂處父謂孟孫墮成齊人必至於北門且成孟氏之保障也無成是無孟氏也子僞不知我將不墮冬十二月公圍成弗克子路使子羔為費宰子曰賊夫人之子子路曰有民人焉有社稷焉何必讀書然後為學子曰是故惡夫佞者廄焚孔子退朝曰傷人乎不問馬乃之火所鄉人有為火來者則拜之士一大夫再子貢曰敢問何也孔子曰其來也亦相弔之道也吾為有司則拜之定公問君使臣臣事君如之何對曰君使臣以禮臣事君以忠又問一言而可以興邦有諸對曰言不可以若是其幾也人之言曰為君難為臣不易如知為君之難也不幾乎一言而興邦乎曰一言而喪邦有諸對曰言不可以若是其幾也人之言曰豫無樂乎為君唯其言而莫豫違也如其善而莫之違也不亦善乎如不善而莫之違也不幾乎一言而喪邦乎子路為季氏宰季氏祭逮暗而祭日不足繼之以燭雖有强力之容肅敬之心皆倦怠矣有司跛倚以臨祭其為不敬大矣他日祭子路與室事交乎户堂事交乎階質明而始行事晏朝而退孔子聞之曰誰謂由也而不知禮乎原思為之宰與之粟九百辭子曰毋以與爾鄰里鄉黨乎甲辰魯定公十三年年五十五為大司冦孟懿子問孝子曰無違樊遲御子告之曰孟孫問孝於我我對曰無違樊遲曰何謂也子曰生事之以禮死葬之以禮祭之以禮定公問於顔回曰子亦聞東野畢之善御乎對曰善則善矣雖然其馬將必佚定公色不悅謂左右曰君子固有誣人也顔回退後三日而來訴之曰東野畢之馬佚兩驂曳兩服入於廄公聞之越席而起促駕召顔回回至公曰前日寡人問吾子以東野畢之御而子曰善則善矣其馬將佚不識吾子奚以知之顔回對曰以政知之昔者帝舜巧於使民造父巧於使馬舜不窮其民力造父不窮其馬力是以舜無佚民造父無佚馬今東野畢之御也乘馬執轡御體正矣步驟馳騁朝禮畢矣歷險致逺馬力盡矣然而猶乃求馬不已臣以此知之公曰善哉若吾子之言也吾子之言其義大矣願少進乎顔回曰臣聞之鳥窮則啄獸窮則攫人窮則詐馬窮則佚自古及今未有窮其下而能無危者也公悅遂以告孔子孔子對曰夫其所以為顔回者此之類也豈足多哉定公問於孔子曰古之帝王必郊祀其祖以配天何也孔子對曰萬物本於天人本於祖郊之祭也大報本反始也故以配上帝天垂象聖人則之郊所以明天道也公曰寡人聞郊而莫同何也孔子曰郊之祭也迎長日之至也大報天而主日配以月故周之始郊其月以日至其日用上辛至於啓蟄之月則又祈穀於上帝此二者天子之禮也魯無冬至大郊之事降殺於天子是以不同也公曰其言郊何也孔子曰兆丘於南所以就陽位也於郊故謂之郊焉曰其牲器何如孔子曰上帝之牛角繭栗必在滌三月后稷之牛唯具所以别事天神與人鬼也牲用騂尚赤也用犢貴誠也掃地而祭貴其質也器用陶匏以象天地之性也萬物無可以稱之者故因其自然之體也公曰天子之郊其禮儀可得聞乎孔子對曰臣聞天子卜郊受命則於祖廟而作龜於禰宫尊祖親考之義也卜之日王親立於澤宫以聼誓命受教諌之義也卜獻命庫門之內所以誡百官也將郊則供天子皮辨以聼報示民嚴上也郊之日喪者不敢哭凶服者不敢入國門泛掃清路行者畢止弗命而民聽敬之至也天子大裘被之黼大裘象天乘素車貴其質也旗十有二旒龍章而設日月所以法天也既至泰壇王脫裘矣服衮以臨燔柴戴冕藻十有二旒則天數也臣聞之誦詩三百不足以一獻一獻之禮不足以大饗大饗之禮不足以大旅大旅具不足以饗帝是以君子無敢輕議於禮者也鄉人儺孔子朝服立於阼階孔子編年卷二
